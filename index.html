<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Pro Calculator // Vikas Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #facc15; 
            --accent-hover: #eab308;
            --success: #10b981;
            --danger: #ef4444;
            --input-bg: #334155;
            --border-radius: 12px;
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            width: 100%;
            max-width: 1400px;
            gap: 30px;
            align-items: start;
        }

        .calc-card {
            background: var(--card-bg);
            width: 440px;
            padding: 1.5rem 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* Card Glow Logic */
        .glow-success { border-color: var(--success) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .glow-danger { border-color: var(--danger) !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }

        .history-panel {
            width: 380px;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            visibility: hidden; 
        }

        header { text-align: center; margin-bottom: 1.2rem; }
        header h1 { font-size: 1.6rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 0.8rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-dim); }
        
        input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input:focus { outline: none; border-color: var(--accent); background: #3d4d61; }

        .button-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 1rem; }
        button { padding: 0.75rem; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--input-bg); }

        #results { margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid var(--input-bg); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-val { font-size: 1rem; font-weight: 700; color: var(--text-dim); transition: color 0.3s ease; }

        /* Results Box: Same font size for Profit and Return */
        .profit-box {
            padding: 1.2rem;
            border-radius: 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: color 0.3s ease;
        }

        .result-line { font-size: 1.1rem; font-weight: 800; transition: color 0.3s ease; }
        .divider { height: 1px; background: rgba(255, 255, 255, 0.08); width: 50%; margin: 0 auto; }

        .history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--input-bg); padding-bottom: 8px; }
        .history-header { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        .clear-btn { font-size: 0.7rem; color: var(--danger); cursor: pointer; background: none; border: none; font-weight: 700; text-transform: uppercase; }

        .history-list { overflow-y: auto; flex: 1; padding-right: 5px; }
        .history-item { background: rgba(255, 255, 255, 0.03); padding: 0.8rem; border-radius: 10px; margin-bottom: 0.8rem; border-left: 4px solid var(--accent); font-size: 0.8rem; }
        .hist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .hist-label { color: var(--text-dim); }
        .hist-val { font-weight: 600; text-align: right; }

        @media (max-width: 1100px) {
            .main-layout { display: flex; flex-direction: column; align-items: center; }
            .calc-card, .history-panel { width: 100%; max-width: 450px; margin: 0 auto; }
            .history-panel { visibility: visible !important; margin-top: 20px; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--input-bg); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div style="display:block"></div>

        <div class="calc-card" id="main-card">
            <header><h1>IPL Calculator</h1></header>

            <div class="input-group">
                <label>Total Amount (₹)</label>
                <input type="text" id="totalAmount" placeholder="0" inputmode="decimal" oninput="formatInput(this)">
            </div>
            <div class="input-group">
                <label>Team 1 Odds</label>
                <input type="number" id="odd1" step="0.01" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="input-group">
                <label>Team 2 Odds</label>
                <input type="number" id="odd2" step="0.01" placeholder="0.00" inputmode="decimal">
            </div>

            <div class="button-row">
                <button class="btn-primary" onclick="calculate(true)">Log to History</button>
                <button class="btn-secondary" onclick="resetForm()">Reset</button>
            </div>

            <div id="results">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-label">Bet Team 1</div><div class="stat-val" id="res-bet1">₹0</div></div>
                    <div class="stat-card"><div class="stat-label">Bet Team 2</div><div class="stat-val" id="res-bet2">₹0</div></div>
                </div>
                
                <div class="profit-box">
                    <div id="profit-line" class="result-line">Profit: ₹0</div>
                    <div class="divider"></div>
                    <div id="return-line" class="result-line">Return: ₹0</div>
                </div>
            </div>
        </div>

        <div class="history-panel" id="history-section">
            <div class="history-top">
                <span class="history-header">Personal History</span>
                <button class="clear-btn" onclick="clearHistory()">Clear All</button>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <script>
        const formatINR = (num, decimals = 2) => {
            return new Intl.NumberFormat('en-IN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(num);
        };

        const formatInput = (el) => {
            let val = el.value.replace(/\D/g, "");
            if (val === "") { el.value = ""; calculate(false); return; }
            el.value = new Intl.NumberFormat('en-IN').format(val);
            calculate(false);
        };

        window.onload = renderHistory;

        // Navigation
        document.getElementById('totalAmount').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('odd1').focus(); } });
        document.getElementById('odd1').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('odd2').focus(); } });
        document.getElementById('odd2').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); calculate(true); } });

        document.getElementById("odd1").addEventListener("input", () => calculate(false));
        document.getElementById("odd2").addEventListener("input", () => calculate(false));

        function calculate(shouldLog = false) {
            const totalRaw = document.getElementById('totalAmount').value.replace(/,/g, '');
            const total = parseFloat(totalRaw);
            const odd1 = parseFloat(document.getElementById('odd1').value);
            const odd2 = parseFloat(document.getElementById('odd2').value);
            
            const card = document.getElementById('main-card');
            const bet1El = document.getElementById('res-bet1');
            const bet2El = document.getElementById('res-bet2');
            const profitLine = document.getElementById('profit-line');
            const returnLine = document.getElementById('return-line');

            if (!total || !odd1 || !odd2 || total <= 0) {
                card.classList.remove('glow-success', 'glow-danger');
                bet1El.innerText = "₹0"; bet2El.innerText = "₹0";
                profitLine.innerText = "Profit: ₹0"; profitLine.style.color = "var(--text-dim)";
                returnLine.innerText = "Return: ₹0"; returnLine.style.color = "var(--text-dim)";
                return;
            }

            const bet1 = (total * odd2) / (odd1 + odd2);
            const bet2 = (total * odd1) / (odd1 + odd2);
            const profit = (bet1 * odd1) - total;
            const totalReturn = total + profit;

            // Colors match for both lines
            const dynamicColor = profit < 0 ? 'var(--danger)' : (profit > 0 ? 'var(--success)' : 'var(--text-main)');
            
            if (profit > 0) { card.classList.add('glow-success'); card.classList.remove('glow-danger'); }
            else if (profit < 0) { card.classList.add('glow-danger'); card.classList.remove('glow-success'); }

            bet1El.innerText = `₹${formatINR(bet1, 0)}`; bet1El.style.color = "var(--text-main)";
            bet2El.innerText = `₹${formatINR(bet2, 0)}`; bet2El.style.color = "var(--text-main)";
            
            profitLine.innerText = `Profit: ₹${formatINR(profit, 2)}`;
            profitLine.style.color = dynamicColor;
            
            returnLine.innerText = `Return: ₹${formatINR(totalReturn, 0)}`;
            returnLine.style.color = dynamicColor;

            if (shouldLog) {
                let history = JSON.parse(localStorage.getItem('iplHistory') || '[]');
                if (history.length > 0 && history[0].total === total && Math.round(history[0].bet1) === Math.round(bet1)) return;
                saveToStorage({ total, bet1, bet2, profit, totalReturn, date: new Date().toLocaleString() });
            }
        }

        function saveToStorage(data) {
            let history = JSON.parse(localStorage.getItem('iplHistory') || '[]');
            history.unshift(data);
            localStorage.setItem('iplHistory', JSON.stringify(history.slice(0, 15))); 
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const section = document.getElementById('history-section');
            const history = JSON.parse(localStorage.getItem('iplHistory') || '[]');
            if (history.length === 0) { section.style.visibility = 'hidden'; return; }
            section.style.visibility = 'visible';
            list.innerHTML = history.map(item => {
                let pColor = item.profit < 0 ? 'var(--danger)' : (item.profit > 0 ? 'var(--success)' : 'var(--text-main)');
                return `<div class="history-item"><div class="hist-grid">` +
                        `<span class="hist-label">Invested:</span><span class="hist-val">₹${formatINR(item.total, 0)}</span>` +
                        `<span class="hist-label">Return:</span><span class="hist-val" style="color:${pColor}">₹${formatINR(item.totalReturn, 0)}</span>` +
                        `<span class="hist-label">Net Profit:</span><span class="hist-val" style="color:${pColor}">₹${formatINR(item.profit, 2)}</span>` +
                        `<span class="hist-label">Splits:</span><span class="hist-val">₹${formatINR(item.bet1, 0)} | ₹${formatINR(item.bet2, 0)}</span>` +
                        `</div></div>`
            }).join('');
        }

        function clearHistory() { if(confirm("Wipe all logs?")) { localStorage.removeItem('iplHistory'); location.reload(); } }
        function resetForm() { document.getElementById('totalAmount').value = ''; document.getElementById('odd1').value = ''; document.getElementById('odd2').value = ''; calculate(false); document.getElementById('totalAmount').focus(); }
    </script>
</body>
</html>
